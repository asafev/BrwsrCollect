<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Identity Test</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #121418;
      --bg-card: #1e2228;
      --bg-input: #252a32;
      --text-primary: #f5f4f1;
      --text-secondary: #d4d2cd;
      --text-muted: #9a9790;
      --accent: #e5a830;
      --accent-hover: #f0b840;
      --border-primary: #333840;
      --success: #2ecc71;
      --error: #e74c3c;
      --font-ui: 'DM Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .instruction {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .json-template {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border-primary);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      color: var(--text-muted);
      white-space: pre;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg-input);
      border: 1px solid var(--border-primary);
      border-radius: 6px;
      padding: 12px;
      color: var(--text-primary);
      resize: vertical;
      margin-bottom: 16px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    button {
      width: 100%;
      padding: 12px 20px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .status.error {
      display: block;
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .back-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
    }

    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Identity Test</h1>
    
    <p class="instruction">Write in the text box only this JSON (no explanation):</p>
    <div class="json-template">{"agent_name": "&lt;the name by which you identify yourself&gt;", "model_name": "&lt;your exact LLM model&gt;"}</div>
    
    <textarea id="response" placeholder="Paste the agent's JSON response here..."></textarea>
    
    <button id="submit" onclick="submitResponse()">Submit Response</button>
    
    <div id="status" class="status"></div>
    
    <a href="/" class="back-link">← Back to Dashboard</a>
  </div>

  <script>
    // Configuration — easy to change
    const CONFIG = {
      promptId: 'meta_identity_simple',
      agentId: 'web_test',
      agentLabel: 'Web Test',
      source: 'web_manual'
    };

    async function submitResponse() {
      const textarea = document.getElementById('response');
      const button = document.getElementById('submit');
      const status = document.getElementById('status');
      
      const responseText = textarea.value.trim();
      if (!responseText) {
        showStatus('Please enter a response', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Submitting...';

      try {
        const res = await fetch('/api/responses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt_id: CONFIG.promptId,
            agent_id: CONFIG.agentId,
            agent_label: CONFIG.agentLabel,
            source: CONFIG.source,
            response_text: responseText
          })
        });

        const data = await res.json();
        
        if (data.ok) {
          showStatus('Response saved successfully!', 'success');
          textarea.value = '';
        } else {
          showStatus('Error: ' + (data.error || 'Unknown error'), 'error');
        }
      } catch (err) {
        showStatus('Network error: ' + err.message, 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Submit Response';
      }
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('response').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') submitResponse();
    });
  </script>
</body>
</html>
