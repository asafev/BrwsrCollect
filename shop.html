<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Shop - Products</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
    }

    header {
      background: #1d1d1f;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 { font-size: 24px; font-weight: 600; }
    header p { opacity: 0.7; font-size: 14px; margin-top: 4px; }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e5e5e5;
    }
    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .product-image {
      height: 160px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 16px;
    }
    .product-name { font-size: 18px; font-weight: 600; color: #1d1d1f; margin-bottom: 8px; }
    .product-desc { font-size: 14px; color: #86868b; margin-bottom: 12px; }
    .product-price { font-size: 20px; font-weight: 700; color: #1d1d1f; }
    .product-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .fade-out { animation: fadeOut 0.5s ease-out forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(0.95); } }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #86868b;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e5e5;
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } }

    .modal {
      background: #1a1a1a;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      color: white;
    }
    .modal-badge {
      background: #2a2a2a;
      padding: 10px 20px;
      font-size: 11px;
      color: #888;
      font-family: monospace;
      border-radius: 16px 16px 0 0;
    }
    .modal-badge span { color: #3b82f6; }
    .modal-header { padding: 24px; text-align: center; border-bottom: 1px solid #333; }
    .modal-icon { font-size: 40px; margin-bottom: 12px; }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-desc { font-size: 14px; color: #888; margin-top: 6px; }
    .modal-body { padding: 20px 24px; }

    .policy-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #ccc;
    }
    .policy-box strong { color: #3b82f6; }
    .policy-links { margin-top: 10px; font-family: monospace; font-size: 12px; }
    .policy-links a { color: #3b82f6; text-decoration: none; margin-right: 16px; }

    .notice {
      background: #2a2a2a;
      border-left: 3px solid #f59e0b;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #999;
    }
    .notice strong { color: #f59e0b; display: block; margin-bottom: 4px; font-size: 10px; text-transform: uppercase; }

    .json-box {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      white-space: pre;
    }
    .json-box .key { color: #7dd3fc; }
    .json-box .val { color: #fbbf24; }

    .task-instruction {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .task-instruction p { font-size: 13px; color: #ccc; margin-bottom: 8px; }
    .task-instruction p:last-child { margin-bottom: 0; font-family: monospace; color: #fbbf24; font-weight: 500; }
    .task-instruction strong { color: #3b82f6; }

    .instruction { font-family: monospace; font-size: 13px; color: #ccc; margin-bottom: 12px; line-height: 1.5; }
    .instruction strong { color: #fbbf24; }

    .json-template {
      font-family: monospace;
      font-size: 11px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      color: #888;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .json-template .key { color: #7dd3fc; }
    .json-template .placeholder { color: #fbbf24; font-style: italic; }

    textarea {
      width: 100%;
      min-height: 100px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #3b82f6; }

    .modal-footer { padding: 16px 24px 24px; border-top: 1px solid #333; }
    button.submit-btn {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button.submit-btn:disabled { opacity: 0.5; }

    .status { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; display: none; }
    .status.success { display: block; background: rgba(34,197,94,0.2); color: #22c55e; }
    .status.error { display: block; background: rgba(239,68,68,0.2); color: #ef4444; }

    .hint { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    .hint kbd { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 11px; color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>Premium Shop</h1>
    <p>Exclusive products at great prices</p>
  </header>

  <div class="container" id="products-section">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>Loading products...</p>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <!-- Modal shell — dynamic body injected by JS -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-badge" id="modal-badge"></div>
      <div class="modal-header">
        <div class="modal-icon" id="modal-icon"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-desc" id="modal-desc"></p>
      </div>
      <div class="modal-body">
        <div id="modal-dynamic-body"></div>
        <textarea id="response"></textarea>
        <p class="hint">Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to submit</p>
      </div>
      <div class="modal-footer">
        <button class="submit-btn" id="btn" onclick="submit()">Submit &amp; Continue</button>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <!-- Modules: session analytics, prompt registry, mutation tracking, report -->
  <script src="shopSession.js"></script>
  <script src="shopPrompts.js"></script>
  <script src="shopMutations.js"></script>
  <script src="shopReport.js"></script>

  <script>
    // ---- Secure Product Store (unchanged) ----
    var SecureProductStore = (function() {
      var _products = null;
      var _isWiped = false;
      var _d = 'W3siaWQiOjEsIm5hbWUiOiJSdW5uaW5nIFNob2VzIFBybyIsImRlc2MiOiJMaWdodHdlaWdodCBwZXJmb3JtYW5jZSBzaG9lcyIsInByaWNlIjoiJDE0OS45OSIsImljb24iOiLwn5GfIiwiZ3JhZGllbnQiOiIjNjY3ZWVhLCAjNzY0YmEyIn0seyJpZCI6MiwibmFtZSI6IlNtYXJ0IFdhdGNoIFgiLCJkZXNjIjoiVHJhY2sgZml0bmVzcyBhbmQgbm90aWZpY2F0aW9ucyIsInByaWNlIjoiJDI5OS45OSIsImljb24iOiLimowiLCJncmFkaWVudCI6IiNmMDkzZmIsICNmNTU3NmMifSx7ImlkIjozLCJuYW1lIjoiV2lyZWxlc3MgSGVhZHBob25lcyIsImRlc2MiOiJOb2lzZSBjYW5jZWxsaW5nLCAzMGggYmF0dGVyeSIsInByaWNlIjoiJDE5OS45OSIsImljb24iOiLwn46nIiwiZ3JhZGllbnQiOiIjNGZhY2ZlLCAjMDBmMmZlIn0seyJpZCI6NCwibmFtZSI6IlBob25lIENhc2UgVWx0cmEiLCJkZXNjIjoiTWlsaXRhcnktZ3JhZGUgcHJvdGVjdGlvbiIsInByaWNlIjoiJDQ5Ljk5IiwiaWNvbiI6IvCfk7EiLCJncmFkaWVudCI6IiM0M2U5N2IsICMzOGY5ZDcifSx7ImlkIjo1LCJuYW1lIjoiVHJhdmVsIEJhY2twYWNrIiwiZGVzYyI6IldhdGVyLXJlc2lzdGFudCwgbGFwdG9wIGNvbXBhcnRtZW50IiwicHJpY2UiOiIkODkuOTkiLCJpY29uIjoi8J+OkiIsImdyYWRpZW50IjoiI2ZhNzA5YSwgI2ZlZTE0MCJ9LHsiaWQiOjYsIm5hbWUiOiJEZXNpZ25lciBTdW5nbGFzc2VzIiwiZGVzYyI6IlVWNDAwIHByb3RlY3Rpb24sIHBvbGFyaXplZCIsInByaWNlIjoiJDEyOS45OSIsImljb24iOiLwn5W277iPIiwiZ3JhZGllbnQiOiIjYTE4Y2QxLCAjZmJjMmViIn1d';
      function _dec(d) { try { return JSON.parse(atob(d)); } catch(e) { return []; } }
      return {
        load: function() { if (_isWiped) return []; if (!_products) _products = _dec(_d); return _products; },
        wipe: function() { _products = null; _isWiped = true; return true; },
        isWiped: function() { return _isWiped; }
      };
    })();

    var DOMSecurityManager = {
      purgeProducts: function() {
        var c = document.getElementById('products-section');
        var g = document.getElementById('products-grid');
        if (g) { while (g.firstChild) g.removeChild(g.firstChild); g.innerHTML = ''; if (g.parentNode) g.parentNode.removeChild(g); }
        if (c) { c.innerHTML = ''; if (c.parentNode) c.parentNode.removeChild(c); }
        if (window.gc) window.gc();
        return true;
      },
      verifyClean: function() {
        return document.querySelectorAll('.product-card, .product-name, .product-price, .product-desc').length === 0;
      }
    };

    var ProductRenderer = {
      render: function(products) {
        var grid = document.getElementById('products-grid');
        var loading = document.getElementById('loading');
        products.forEach(function(p) {
          var card = document.createElement('div');
          card.className = 'product-card';
          card.onclick = onProductClick;
          card.innerHTML = '<div class="product-image" style="background:linear-gradient(135deg,' + p.gradient + ')">' + p.icon + '</div>'
            + '<div class="product-name">' + p.name + '</div>'
            + '<div class="product-desc">' + p.desc + '</div>'
            + '<div class="product-price">' + p.price + '</div>'
            + '<button class="product-btn">View Details</button>';
          grid.appendChild(card);
        });
        loading.style.display = 'none';
      }
    };

    Object.freeze(SecureProductStore);
    Object.freeze(DOMSecurityManager);
    Object.freeze(ProductRenderer);

    // ---- State ----
    var triggered = false;
    var verificationShown = false;
    var activeType = resolvePromptType();

    // ---- Init ----
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var products = SecureProductStore.load();
        ProductRenderer.render(products);
      }, 500);
    });

    function onProductClick() {
      if (triggered) return;
      triggered = true;
      setTimeout(triggerVerification, 2000);
    }

    function triggerVerification() {
      if (verificationShown) return;
      verificationShown = true;

      var section = document.getElementById('products-section');
      var modal = document.getElementById('modal');
      section.classList.add('fade-out');

      setTimeout(function() {
        SecureProductStore.wipe();
        DOMSecurityManager.purgeProducts();

        // Render prompt based on type
        renderPromptModal(activeType);

        // Attach mutation tracker to textarea
        _mut.attach(document.getElementById('response'));

        modal.classList.add('active');
        document.body.style.background = '#0a0a0a';
      }, 500);
    }

    function submit() {
      var text = document.getElementById('response').value.trim();
      if (!text) return showStatus('Enter response', 'error');

      var prompt = PromptRegistry[activeType];
      var parsed = null;
      try {
        parsed = JSON.parse(text);
      } catch(e) {
        return showStatus('Invalid JSON', 'error');
      }

      var err = prompt.validate(parsed);
      if (err) return showStatus(err, 'error');

      // Build full report
      var data = _report.build(activeType, prompt, text);

      // Download JSON
      _report.download(data);

      // Inject report div at top of page
      _report.inject(data);

      showStatus('Verified. Report exported.', 'success');
      document.getElementById('btn').disabled = true;
    }

    function showStatus(msg, type) {
      var s = document.getElementById('status');
      s.textContent = msg;
      s.className = 'status ' + type;
    }

    document.getElementById('response').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
